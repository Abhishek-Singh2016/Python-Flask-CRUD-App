apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credential-refresher
spec:
  schedule: "0 */8 * * *cloud"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresh-sa
          restartPolicy: OnFailure
          containers:
          - name: refresher
            image: amazon/aws-cli:latest
            env:
            - name: REGION
              value: "us-east-1" # Change to your region
            - name: ACCOUNT_ID
              value: "702175642104" # Change to your AWS Account ID
            - name: SECRET_NAME
              value: "ecr-pull-image-secret"
            command:
            - /bin/sh
            - -c
            - |
              # Install kubectl (standard aws-cli image doesn't have it)
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              
              echo "Fetching ECR token..."
              ECR_PASSWORD=$(aws ecr get-login-password --region $REGION)
              
              echo "Updating Secret: $SECRET_NAME"
              ./kubectl create secret docker-registry $SECRET_NAME \
                --docker-server=${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com \
                --docker-username=AWS \
                --docker-password=$ECR_PASSWORD \
                --dry-run=client -o yaml | ./kubectl apply -f -
              
              echo "Secret updated successfully at $(date)"